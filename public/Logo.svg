<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="100%" height="100%" fill="none">
  <defs>
    <!-- Linear & Radial Gradients for Brand Emblem -->
    <linearGradient id="deyzora-blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070F3" />
      <stop offset="100%" stop-color="#00C6FF" />
    </linearGradient>
    <linearGradient id="deyzora-cyan-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50E3C2" />
      <stop offset="100%" stop-color="#0070F3" />
    </linearGradient>
    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Modern Geometric Monogram Icon (D Badge) -->
  <g transform="translate(10, 10)">
    <!-- Outer Hex Shield/Diamond -->
    <path d="M 50,5 L 88,27 L 88,73 L 50,95 L 12,73 L 12,27 Z" 
          stroke="url(#deyzora-blue-grad)" 
          stroke-width="5" 
          fill="#0A0A0A" 
          stroke-linejoin="round"/>

    <!-- Inner Futuristic D-Facet Geometry -->
    <path d="M 32,28 L 54,28 C 66,28 73,35 73,50 C 73,65 66,72 54,72 L 32,72 Z" 
          fill="url(#deyzora-blue-grad)" />
    
    <path d="M 42,38 L 52,38 C 59,38 63,42 63,50 C 63,58 59,62 52,62 L 42,62 Z" 
          fill="#000000" />
          
    <path d="M 50,5 L 88,27 L 50,50 Z" 
          fill="url(#deyzora-cyan-grad)" 
          opacity="0.35" />

    <!-- Accent Dot -->
    <circle cx="50" cy="50" r="4" fill="#50E3C2" filter="url(#subtle-glow)" />
  </g>

  <!-- Brand Typography -->
  <!-- "DEYZORA" -->
  <text x="118" y="62" 
        fill="#FFFFFF" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-weight="900" 
        font-size="42" 
        letter-spacing="1.5">DEYZORA</text>

  <!-- "INFOTECH" Subtitle -->
  <text x="120" y="90" 
        fill="#50E3C2" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-weight="700" 
        font-size="16" 
        letter-spacing="7">INFOTECH</text>
        
  <!-- Glowing Dot Indicator -->
  <circle cx="370" cy="54" r="5" fill="#0070F3" />
</svg>
